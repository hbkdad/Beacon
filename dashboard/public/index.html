<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SelfClawy Dashboard</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0f14;--surface:#13161e;--border:#1e2330;--accent:#ff5a36;--accent-dim:rgba(255,90,54,0.12);
      --green:#22c55e;--green-dim:rgba(34,197,94,0.12);--yellow:#eab308;--text:#e2e8f0;--muted:#64748b;
      --mono:'Fira Mono',monospace;--shadow:0 2px 12px rgba(0,0,0,.4)
    }
    [data-theme="light"]{
      --bg:#f1f5f9;--surface:#ffffff;--border:#e2e8f0;--accent:#e04a2a;--accent-dim:rgba(224,74,42,0.1);
      --green:#16a34a;--green-dim:rgba(22,163,74,0.1);--yellow:#ca8a04;--text:#1e293b;--muted:#94a3b8;
      --shadow:0 2px 12px rgba(0,0,0,.08)
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;transition:background .2s,color .2s}
    /* ── Login screen ── */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
    .login-logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1.2rem;margin-bottom:2rem}
    .login-logo span{color:var(--accent)}
    .login-card h2{font-size:1.1rem;margin-bottom:1.5rem;color:var(--muted);font-weight:400}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.05em}
    .field input{width:100%;padding:.65rem .9rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)}
    #login-error{color:#ef4444;font-size:.82rem;margin-bottom:.75rem;min-height:1.2em}
    /* ── Header ── */
    header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1.1rem}
    .logo span{color:var(--accent)}
    .header-right{display:flex;align-items:center;gap:.75rem}
    .pill{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .75rem;border-radius:999px;font-size:.78rem;font-weight:600;text-transform:uppercase}
    .pill.online{background:var(--green-dim);color:var(--green)}
    .pill.offline{background:var(--accent-dim);color:var(--accent)}
    .pill.loading{background:rgba(234,179,8,.12);color:var(--yellow)}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    /* ── Theme toggle ── */
    .theme-btn{background:var(--border);border:none;border-radius:8px;padding:.4rem .65rem;cursor:pointer;font-size:1rem;color:var(--text);line-height:1;transition:background .15s}
    .theme-btn:hover{background:var(--accent-dim)}
    /* ── Main layout ── */
    main{max-width:1000px;margin:0 auto;padding:2rem}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color .15s}
    .card-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem}
    .card-value{font-size:1.5rem;font-weight:700}
    .card-value.green{color:var(--green)}
    /* ── Controls row ── */
    .controls{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
    button{padding:.6rem 1.4rem;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;color:inherit}
    button:active{transform:scale(.97)}
    button:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-ghost{background:var(--border);color:var(--text)}
    .btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
    .btn-backup{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
    /* ── Model switcher ── */
    .model-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .model-row label{font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .9rem;color:var(--text);font-size:.88rem;cursor:pointer;outline:none}
    select:focus{border-color:var(--accent)}
    /* ── Log viewer ── */
    .log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
    .log-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--muted)}
    .log-header .dots{display:flex;gap:6px}
    .dot-r{width:10px;height:10px;border-radius:50%;background:#ef4444}
    .dot-y{width:10px;height:10px;border-radius:50%;background:var(--yellow)}
    .dot-g{width:10px;height:10px;border-radius:50%;background:var(--green)}
    #log{font-family:var(--mono);font-size:.8rem;color:#94a3b8;padding:1rem;height:320px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6}
    .line-ok{color:var(--green)}.line-err{color:#f87171}.line-warn{color:var(--yellow)}.line-info{color:#60a5fa}
    /* ── Link cards ── */
    .links{display:flex;gap:1rem;flex-wrap:wrap}
    .link-card{flex:1;min-width:170px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;text-decoration:none;color:var(--text);transition:border-color .15s;display:flex;align-items:center;gap:.75rem}
    .link-card:hover{border-color:var(--accent)}
    .link-icon{font-size:1.4rem}
    .link-label{font-size:.85rem;font-weight:600}
    .link-sub{font-size:.72rem;color:var(--muted)}
    /* ── Toast ── */
    #toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem 1.2rem;font-size:.85rem;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:100}
    #toast.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<!-- ── Login screen (JWT mode) ─────────────────────────────────────────── -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo"><span style="font-size:1.6rem">🦞</span><div>Self<span>Clawy</span></div></div>
    <h2>Sign in to your dashboard</h2>
    <div class="field"><label>Username</label><input id="l-user" type="text" value="admin" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="l-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"></div>
    <div id="login-error"></div>
    <button class="btn-primary" style="width:100%" onclick="login()">Sign in</button>
  </div>
</div>

<!-- ── Main dashboard ──────────────────────────────────────────────────── -->
<div id="app" style="display:none">
<header>
  <div class="logo"><span style="font-size:1.4rem">🦞</span><div>Self<span>Clawy</span> <span style="color:var(--muted);font-weight:400;font-size:.85rem">dashboard</span></div></div>
  <div class="header-right">
    <div id="status-pill" class="pill loading"><span class="dot"></span> Checking…</div>
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
</header>
<main>
  <!-- Stat cards -->
  <div class="cards">
    <div class="card"><div class="card-label">Status</div><div class="card-value" id="stat-status">—</div></div>
    <div class="card"><div class="card-label">Uptime</div><div class="card-value green" id="stat-uptime">—</div></div>
    <div class="card"><div class="card-label">Gateway Health</div><div class="card-value" id="stat-health">—</div></div>
    <div class="card"><div class="card-label">Started At</div><div class="card-value" style="font-size:1rem;padding-top:.3rem" id="stat-started">—</div></div>
    <div class="card"><div class="card-label">Tokens Today</div><div class="card-value" id="stat-tokens" style="color:#60a5fa">—</div></div>
    <div class="card"><div class="card-label">Log Errors</div><div class="card-value" id="stat-errors" style="color:#f87171">—</div></div>
  </div>

  <!-- Model switcher -->
  <div class="model-row">
    <label>Model</label>
    <select id="model-select" onchange="switchModel()">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-opus-4-8">Claude Opus 4.8</option>
      <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
      <option value="gpt-4o">GPT-4o</option>
      <option value="gpt-4o-mini">GPT-4o mini</option>
      <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
    </select>
    <span id="model-status" style="font-size:.78rem;color:var(--muted)"></span>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-primary" id="btn-start" onclick="action('start')">▶ Start</button>
    <button class="btn-ghost" id="btn-restart" onclick="action('restart')">↺ Restart</button>
    <button class="btn-danger" id="btn-stop" onclick="action('stop')">■ Stop</button>
    <button class="btn-backup" onclick="backup()">⬇ Backup</button>
  </div>

  <!-- Log viewer -->
  <div class="log-wrap">
    <div class="log-header">
      <div class="dots"><div class="dot-r"></div><div class="dot-y"></div><div class="dot-g"></div></div>
      <span>openclaw — live logs</span>
      <button class="btn-ghost" style="padding:.2rem .7rem;font-size:.75rem" onclick="clearLog()">Clear</button>
    </div>
    <div id="log"></div>
  </div>

  <!-- Quick links -->
  <div class="links">
    <a class="link-card" href="#" onclick="openGateway();return false"><span class="link-icon">🌐</span><div><div class="link-label">OpenClaw UI</div><div class="link-sub">Open gateway dashboard</div></div></a>
    <a class="link-card" href="https://docs.openclaw.ai" target="_blank"><span class="link-icon">📖</span><div><div class="link-label">Documentation</div><div class="link-sub">docs.openclaw.ai</div></div></a>
    <a class="link-card" href="https://github.com/hbkdad/selfclawy" target="_blank"><span class="link-icon">🐙</span><div><div class="link-label">GitHub</div><div class="link-sub">Source code</div></div></a>
  </div>
</main>
</div>

<div id="toast"></div>

<script>
// ── Auth helpers ──────────────────────────────────────────────────────────────
let authToken = localStorage.getItem('sc-token') || null;

function csrfToken() {
  const m = document.cookie.match(/csrf-token=([a-f0-9]+)/);
  return m ? m[1] : '';
}

function headers(extra) {
  const h = { 'Content-Type': 'application/json', 'X-CSRF-Token': csrfToken() };
  if (authToken) h['Authorization'] = 'Bearer ' + authToken;
  return Object.assign(h, extra);
}

async function apiFetch(url, opts) {
  opts = opts || {};
  opts.headers = headers(opts.headers);
  const r = await fetch(url, opts);
  if (r.status === 401) { logout(); return null; }
  return r;
}

// ── Login / logout ────────────────────────────────────────────────────────────
async function login() {
  const user = document.getElementById('l-user').value;
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    if (!r.ok) { err.textContent = 'Invalid credentials.'; return; }
    const data = await r.json();
    authToken = data.token;
    localStorage.setItem('sc-token', authToken);
    showApp();
  } catch(e) { err.textContent = 'Network error.'; }
}

function logout() {
  authToken = null;
  localStorage.removeItem('sc-token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ── Boot: detect auth mode ────────────────────────────────────────────────────
(async function boot() {
  // Try GET /api/status — if 401, show login; if 200 (basic auth handled by browser), show app
  const r = await fetch('/api/status');
  if (r.status === 401 && !authToken) {
    // JWT mode — show login screen
    document.getElementById('login-screen').style.display = 'flex';
  } else {
    showApp();
  }
})();

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initSocket();
  loadConfig();
  poll();
  setInterval(poll, 10000);
}

// ── Theme toggle ──────────────────────────────────────────────────────────────
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
let isDark = localStorage.getItem('sc-theme') ? localStorage.getItem('sc-theme') === 'dark' : prefersDark.matches;

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const btn = document.querySelector('.theme-btn');
  if (btn) btn.textContent = isDark ? '🌙' : '☀️';
}
applyTheme();

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('sc-theme', isDark ? 'dark' : 'light');
  applyTheme();
}

// ── Socket.io log streaming ───────────────────────────────────────────────────
let socket;
const logEl = document.getElementById('log');

function initSocket() {
  socket = io();
  socket.emit('subscribe-logs');
  socket.on('log', (line) => {
    const s = document.createElement('span');
    if (/error|fatal/i.test(line)) s.className = 'line-err';
    else if (/warn/i.test(line)) s.className = 'line-warn';
    else if (/info|start|listen/i.test(line)) s.className = 'line-info';
    else if (/success|ready/i.test(line)) s.className = 'line-ok';
    s.textContent = line;
    logEl.appendChild(s);
    logEl.scrollTop = logEl.scrollHeight;
  });
}

function clearLog() { logEl.innerHTML = ''; }

// ── Status polling ────────────────────────────────────────────────────────────
async function poll() {
  try {
    const r = await apiFetch('/api/status');
    if (!r) return;
    const d = await r.json();
    const pill = document.getElementById('status-pill');
    if (d.running && d.healthy) { pill.className = 'pill online'; pill.innerHTML = '<span class="dot"></span> Online'; }
    else if (d.running) { pill.className = 'pill loading'; pill.innerHTML = '<span class="dot"></span> Starting…'; }
    else { pill.className = 'pill offline'; pill.innerHTML = '<span class="dot"></span> Offline'; }
    document.getElementById('stat-status').textContent = d.status || '—';
    document.getElementById('stat-health').textContent = d.healthy ? '✓ Healthy' : '✗ Down';
    document.getElementById('stat-health').style.color = d.healthy ? 'var(--green)' : 'var(--accent)';
    const u = d.uptime;
    document.getElementById('stat-uptime').textContent = u ? `${Math.floor(u/3600)}h ${Math.floor((u%3600)/60)}m ${u%60}s` : '—';
    document.getElementById('stat-started').textContent = d.startedAt ? new Date(d.startedAt).toLocaleString() : '—';
    document.getElementById('stat-tokens').textContent = d.tokensToday != null ? d.tokensToday.toLocaleString() : '—';
    document.getElementById('stat-errors').textContent = d.errorsTotal != null ? d.errorsTotal : '—';
    document.getElementById('btn-start').disabled = d.running;
    document.getElementById('btn-stop').disabled = !d.running;
    document.getElementById('btn-restart').disabled = !d.running;
  } catch(e) {
    document.getElementById('status-pill').className = 'pill offline';
    document.getElementById('status-pill').innerHTML = '<span class="dot"></span> Error';
  }
}

// ── Container actions ─────────────────────────────────────────────────────────
async function action(cmd) {
  const btn = document.getElementById(`btn-${cmd}`);
  btn.disabled = true; btn.textContent = '…';
  try {
    await apiFetch(`/api/${cmd}`, { method: 'POST' });
    setTimeout(poll, 1500);
  } catch(e) { toast('Error: ' + e.message); }
  finally { setTimeout(() => { btn.disabled = false; btn.textContent = {start:'▶ Start',stop:'■ Stop',restart:'↺ Restart'}[cmd]; }, 2000); }
}

// ── Model switcher ────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await apiFetch('/api/config');
    if (!r || !r.ok) return;
    const cfg = await r.json();
    const activeProvider = Object.keys(cfg.providers || {})[0];
    if (activeProvider && cfg.providers[activeProvider].model) {
      const sel = document.getElementById('model-select');
      const model = cfg.providers[activeProvider].model;
      for (const opt of sel.options) { if (opt.value === model) { sel.value = model; break; } }
      document.getElementById('model-status').textContent = `(${activeProvider})`;
    }
  } catch(_) {}
}

async function switchModel() {
  const model = document.getElementById('model-select').value;
  const provider = model.startsWith('gpt') ? 'openai' : model.startsWith('gemini') ? 'gemini' : 'anthropic';
  const r = await apiFetch('/api/config', {
    method: 'POST',
    body: JSON.stringify({ provider, model })
  });
  if (r && r.ok) {
    document.getElementById('model-status').textContent = `(${provider}) — restart to apply`;
    toast('Model updated. Restart to apply.');
  }
}

// ── Backup ────────────────────────────────────────────────────────────────────
async function backup() {
  toast('Preparing backup…');
  try {
    const r = await apiFetch('/api/backup', { method: 'POST' });
    if (!r || !r.ok) { toast('Backup failed.'); return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `openclaw-backup-${new Date().toISOString().slice(0,10)}.tar.gz`;
    a.click(); URL.revokeObjectURL(url);
    toast('Backup downloaded.');
  } catch(e) { toast('Backup error: ' + e.message); }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function openGateway() { window.open(`${location.protocol}//${location.hostname}:18789`, '_blank'); }
</script>
</body>
</html>
