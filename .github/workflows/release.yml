name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci --prefer-offline && npm test
        env:
          AUTH_MODE: basic
          DASHBOARD_PASSWORD: testpass

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: launcher/go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          cd launcher
          VER="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.Version=${VER#v}"
          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o ../dist/beacon-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o ../dist/beacon-linux-amd64   .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o ../dist/beacon-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o ../dist/beacon-darwin-arm64  .
          ls -lh ../dist/

      - name: Extract changelog notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -2 | tail -n +2)
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Beacon ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          files: |
            dist/beacon-windows-amd64.exe
            dist/beacon-linux-amd64
            dist/beacon-darwin-amd64
            dist/beacon-darwin-arm64
