name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: claude-sonnet-4-6
          max_turns: "10"
          allowed_tools: "Bash,Read,Edit,Write,Grep,Glob"
          custom_instructions: |
            You are helping with the Beacon project (selfclawy repo) — a self-hosted
            AI control plane for OpenClaw + Hermes + Ollama. Key facts:
            - Dashboard: Node.js/Express at dashboard/server.js
            - Frontend: dashboard/public/index.html (vanilla JS/CSS)
            - Tests: dashboard/tests/api.test.js (Jest + Supertest, 31 tests)
            - Run tests: cd dashboard && npm test
            - Auth: basic (HTTP Basic) or jwt mode
            Always run npm test after code changes. Keep changes minimal and focused.
