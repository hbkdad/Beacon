name-template: 'Beacon v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bugfix', 'bug']
  - title: '🔒 Security'
    labels: ['security']
  - title: '🧹 Maintenance'
    labels: ['chore', 'deps', 'dependencies', 'ci']
  - title: '📖 Docs'
    labels: ['docs', 'documentation']

version-resolver:
  major:
    labels: ['breaking-change', 'major']
  minor:
    labels: ['feature', 'enhancement', 'minor']
  patch:
    labels: ['fix', 'bugfix', 'bug', 'security', 'chore', 'deps', 'patch']
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
