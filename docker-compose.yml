services:
  openclaw:
    image: node:22-alpine
    container_name: openclaw
    restart: unless-stopped
    working_dir: /app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENCLAW_PORT=${OPENCLAW_PORT:-18789}
      - OPENCLAW_SECRET=${OPENCLAW_SECRET}
    volumes:
      - openclaw_data:/root/.openclaw
      - ./config/openclaw.json:/root/.openclaw/openclaw.json:ro
    ports:
      - "${OPENCLAW_PORT:-18789}:18789"
    command: >
      sh -c "
        npm install -g openclaw@latest --quiet &&
        openclaw start
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: selfclawy-dashboard
    restart: unless-stopped
    depends_on:
      - openclaw
    environment:
      - OPENCLAW_URL=http://openclaw:18789
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3001}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-changeme}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  watchtower:
    image: containrrr/watchtower
    container_name: selfclawy-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    profiles:
      - autoupdate

volumes:
  openclaw_data:
    driver: local
