<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060a0f"/>
  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a2332" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a2332" stroke-width="1"/>
  <!-- Glow -->
  <ellipse cx="600" cy="260" rx="340" ry="180" fill="#10b981" fill-opacity="0.05"/>

  <!-- Signal tower icon (centered, large) -->
  <g transform="translate(500, 80) scale(4)">
    <line x1="25" y1="80" x2="25" y2="52" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
    <line x1="13" y1="80" x2="37" y2="80" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
    <circle cx="25" cy="48" r="6" fill="#10b981"/>
    <path d="M13 44Q25 28 37 44" stroke="#10b981" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M4 38Q25 12 46 38" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round" opacity=".45"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="390" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="96" font-weight="800" fill="#e2e8f0" letter-spacing="-3">beacon</text>

  <!-- Tagline -->
  <text x="600" y="456" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif" font-size="30" font-weight="400" fill="#6b7280" letter-spacing="0">AI that works for you, 24/7.</text>

  <!-- Bottom stats row -->
  <rect x="260" y="520" width="680" height="1" fill="#1a2332"/>
  <text x="360" y="558" text-anchor="middle" font-family="monospace" font-size="20" fill="#10b981" font-weight="700">50+ channels</text>
  <text x="600" y="558" text-anchor="middle" font-family="monospace" font-size="20" fill="#10b981" font-weight="700">5,700+ skills</text>
  <text x="840" y="558" text-anchor="middle" font-family="monospace" font-size="20" fill="#10b981" font-weight="700">$0 forever</text>
</svg>
